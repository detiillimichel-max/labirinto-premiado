<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Labirinto do Robozinho</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <div class="info">
      <span>Fase <b id="fase">1</b></span>
      <span>·</span>
      <span>Ciclo <b id="ciclo">1</b></span>
    </div>
    <div class="points">⭐ <b id="pontos">0</b></div>
    <button id="shopBtn" class="shop-btn">🛒 LOJA</button>
  </header>

  <div id="message" class="message">Escolha uma entrada 🚪</div>

  <div id="maze-container">
    <div id="maze"></div>
  </div>

  <div class="controls">
    <button data-dir="up">▲</button>
    <div>
      <button data-dir="left">◀</button>
      <button data-dir="down">▼</button>
      <button data-dir="right">▶</button>
    </div>
  </div>
</div>

<div id="shop" class="modal hidden">
  <div class="modal-content">
    <h2>🛒 Loja de Guias</h2>
    <p class="saldo">Seus pontos: <b id="shopPontos">0</b></p>
    
    <div class="item">
      <div>
        <h3>Guia Rápido</h3>
        <p>Mostra o caminho por 2 segundos</p>
      </div>
      <button data-buy="rapido">50 pts</button>
    </div>
    
    <div class="item">
      <div>
        <h3>Guia Estendido</h3>
        <p>Mostra o caminho por 3 segundos</p>
      </div>
      <button data-buy="estendido">80 pts</button>
    </div>

    <button id="closeShop" class="close">Fechar</button>
  </div>
</div>

<div id="win" class="modal hidden">
  <div class="modal-content win">
    <h2>⭐ Fase completa!</h2>
    <p>+100 pontos</p>
    <button id="nextBtn">Próxima fase</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
